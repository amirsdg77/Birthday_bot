services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: bestie-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false          # set this manually in Render dashboard
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: TEMPERATURE
        value: "0.8"
      - key: MAX_TOKENS
        value: "1024"
      - key: ACCESS_PASSWORD
        sync: false          # set this manually in Render dashboard
      - key: DATABASE_URL
        sync: false          # set to your Supabase PostgreSQL connection string
    plan: free

  # ── Frontend (React static site) ──────────────────────────────────────────
  - type: web
    name: bestie-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        sync: false          # set to your backend URL, e.g. https://bestie-backend.onrender.com
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

